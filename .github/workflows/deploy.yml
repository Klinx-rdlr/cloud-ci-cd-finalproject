name: CI - Build and Push to Docker Hub

on:
  push:
    branches: [main] # Triggers every time you push to 'main'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Replace 'your-username' with your actual Docker ID if you want to hardcode,
          # or keep using the secret for flexibility.
          tags: ${{ secrets.DOCKER_USERNAME }}/chef-architect:latest
          # This speeds up future builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
